[build]
builder = "NIXPACKS"

[build.nixpacks]
installCmd = "npm install"
# Vite ya vacía frontend/dist en cada build (emptyOutDir), así que basta con
# el build normal. Se mantiene simple y conocido para no romper el deploy.
buildCmd = "npm run build"

[deploy]
startCommand = "node backend/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
