[build]
builder = "NIXPACKS"

[build.nixpacks]
installCmd = "npm install"
# Borra el dist previo para garantizar un build de frontend limpio en cada
# deploy (evita servir un dist cacheado/antiguo).
buildCmd = "rm -rf frontend/dist && npm run build"

[deploy]
startCommand = "node backend/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
